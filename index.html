<link rel="stylesheet" href="styles.css"/>
<style>
  /* ============================================================
     MOBILE = real fullscreen app · DESKTOP = phone showcase
     ============================================================
     On desktop we show the app inside a 402x874 phone bezel (the
     showcase look). On mobile we throw away the bezel, scaling
     the app's screen to fill the entire viewport so it feels like
     a native app the user actually opened on their phone.
  */
  html, body { background: #E8E4DA; }
  body { overscroll-behavior: none; }

  /* ---- Desktop / tablet: existing showcase, just make sure
          nothing leaks. JS scaler below adapts if browser is small. */
  .stage { overflow: hidden; }
  .frames {
    transform: scale(var(--fit-scale, 1));
    transform-origin: center center;
  }

  /* ---- Mobile fullscreen mode (true narrow phones / portrait) ---- */
  @media (max-width: 720px) {
    html, body { background: var(--paper, #FFF8EC) !important; }
    .stage {
      position: fixed; inset: 0;
      background: var(--paper, #FFF8EC) !important;
      align-items: stretch !important;
      justify-content: stretch !important;
    }
    .frames {
      gap: 0 !important;
      width: 100% !important; height: 100% !important;
      transform: none !important;
    }
    /* IOSDevice root (the .frames > div with inline width/height/borderRadius). */
    .frames > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      max-width: none !important; max-height: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: var(--paper, #FFF8EC) !important;
    }
    /* Hide the iOS chrome we faked on desktop:
       Dynamic Island (top: 11; width:126; height:37; borderRadius:24)
       and home indicator (bottom bar with width:139; height:5). */
    .frames > div > div[style*="width: 126px"][style*="height: 37px"],
    .frames > div > div[style*="height: 34px"] {
      display: none !important;
    }
    /* Hide the fake iOS status bar (9:41 / signal / battery row).
       It sits absolutely at top:0, ~44px tall. We let the real device
       status bar show through instead. */
    .frames > div > div[style*="height: 44px"][style*="position: absolute"][style*="top: 0"],
    .frames > div > div[style*="position: absolute"][style*="top: 0px"][style*="height: 44px"] {
      display: none !important;
    }
    /* Pull screen content to top of viewport (no notch padding needed
       since the OS draws the real status bar above us). */
    .scroll {
      padding-top: max(56px, env(safe-area-inset-top, 56px)) !important;
    }
    /* Tab bar respects bottom safe area on iOS notch devices. */
    .tabbar {
      bottom: max(12px, env(safe-area-inset-bottom, 12px)) !important;
    }
    /* View switcher (Kid / Parent) goes to top, smaller, above safe area. */
    .view-switch {
      top: max(8px, env(safe-area-inset-top, 8px)) !important;
      transform: translateX(-50%) scale(0.85) !important;
      transform-origin: top center;
    }
  }

  /* Larger viewports: keep the safe-area-aware switch position. */
  @supports (padding: max(0px)) {
    .view-switch { top: max(14px, env(safe-area-inset-top, 14px)); }
  }
</style>

<script>
/* Mobile fit-to-viewport scaler.
   Computes the largest scale that lets the .frames element fit the viewport,
   accounting for the view-switch chrome at top and a small safety margin.
   Updates a CSS variable; CSS handles the rest. */
(function () {
  function fit() {
    var stage = document.querySelector('.stage');
    var frames = document.querySelector('.frames');
    if (!stage || !frames) return;
    // Reset transform to measure natural size
    var prev = frames.style.transform;
    frames.style.transform = 'scale(1)';
    var w = frames.offsetWidth, h = frames.offsetHeight;
    frames.style.transform = prev;
    if (!w || !h) return;
    // Available area: viewport minus chrome (view-switch ~70px) and safe areas
    var chromeTop = 80;
    var marginX = 16, marginBottom = 16;
    var availW = window.innerWidth - marginX * 2;
    var availH = window.innerHeight - chromeTop - marginBottom;
    var scale = Math.min(availW / w, availH / h, 1);
    // On wide screens we cap at 1 (don't enlarge); on mobile this scales down.
    document.documentElement.style.setProperty('--fit-scale', scale.toFixed(4));
  }
  // Run after first paint so React has mounted .frames
  if (document.readyState === 'complete') setTimeout(fit, 60);
  else window.addEventListener('load', function () { setTimeout(fit, 60); });
  // Also re-run when React likely finishes (covers Babel async)
  setTimeout(fit, 400);
  setTimeout(fit, 1200);
  setTimeout(fit, 2500);
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  // Observe DOM mutations on root in case frames mount later
  var mo = new MutationObserver(function () { fit(); });
  mo.observe(document.body, { childList: true, subtree: true });
  setTimeout(function () { mo.disconnect(); }, 5000);
})();
</script>
